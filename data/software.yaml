# Single source of truth for the /software/ page. Edit here, rebuild.
# Descriptions are curated summaries — refine as you like.
categories:
  - name: "Phonology & sound change"
    items:
      - name: "maniphono"
        description: "Representation and manipulation of phonological entities — sounds, segments, and features — as the substrate for sound-change work."
        repository_url: "https://github.com/tresoldi/maniphono"
        language: "Python"
      - name: "alteruphono"
        description: "Modelling and simulation of sound change: applying regular rules to phonological sequences."
        repository_url: "https://github.com/tresoldi/alteruphono"
        language: "Python"
      - name: "distfeat"
        description: "Handling of distinctive-feature data for phonological analysis and machine learning."
        repository_url: "https://github.com/tresoldi/distfeat"
        language: "Python"
      - name: "multitiers"
        description: "Multi-tiered representation of sequences for sound-correspondence studies and feature extraction."
        repository_url: "https://github.com/tresoldi/multitiers"
        language: "Python"
  - name: "Phylogenetics & sequence comparison"
    items:
      - name: "ngesh"
        description: "Generation of synthetic phylogenetic data for testing and validating computational methods."
        repository_url: "https://github.com/tresoldi/ngesh"
        pypi_url: "https://pypi.org/project/ngesh/"
        language: "Python"
      - name: "malign"
        description: "Asymmetric and multiple alignment of sequences, with applications in phonology and sound change."
        repository_url: "https://github.com/tresoldi/malign"
        language: "Python"
      - name: "phylovector"
        description: "Vector-based representations for phylogenetic analysis in historical linguistics."
        repository_url: "https://github.com/tresoldi/phylovector"
        language: "Python"
      - name: "seqsim"
        description: "Measures of similarity and distance between sequences."
        repository_url: "https://github.com/evotext/seqsim"
        language: "Python"
      - name: "panphylo"
        description: "Conversion and manipulation of phylogenetic and linguistic data across common formats."
        repository_url: "https://github.com/tresoldi/panphylo"
        language: "Python"
  - name: "Lexical data & databases"
    items:
      - name: "Arca Verborum"
        description: "Analysis-ready lexical data for computational historical linguistics: 149 Lexibank collections, 2.9 million forms across 9,700+ languages, denormalised into single-file CSVs for rapid method development and teaching."
        repository_url: "https://github.com/tresoldi/arcaverborum"
        project_url: "https://www.tresoldi.org/arcaverborum"
        language: "Data"
      - name: "GLED"
        description: "The Global Lexical Database — basic vocabulary for ~6,500 doculects across 344 families, with machine-detected cognates and phonological alignments (Journal of Open Humanities Data, 2023)."
        repository_url: "https://github.com/tresoldi/gled"
        language: "Data"
  - name: "General libraries & tools"
    items:
      - name: "nhandu"
        description: "Literate programming for Python: write executable documents in plain .py files, with captured output, plots, and rich object rendering. A git-friendly alternative to Jupyter notebooks."
        repository_url: "https://github.com/tresoldi/nhandu"
        pypi_url: "https://pypi.org/project/nhandu/"
        language: "Python"
      - name: "dafsa"
        description: "Deterministic Acyclic Finite State Automata for efficient string matching and morphological analysis."
        repository_url: "https://github.com/tresoldi/dafsa"
        pypi_url: "https://pypi.org/project/dafsa/"
        language: "Python"
      - name: "freqprob"
        description: "Frequency-probability estimation for linguistic datasets — smoothing and scoring methods."
        repository_url: "https://github.com/tresoldi/freqprob"
        language: "Python"
      - name: "asymcat"
        description: "Statistical analysis of asymmetric categorical associations, with applications in typology and the modelling of sound change."
        repository_url: "https://github.com/tresoldi/asymcat"
        language: "Python"
      - name: "lpngram"
        description: "N-gram collection and language-model utilities for sequence data."
        repository_url: "https://github.com/tresoldi/lpngram"
        language: "Python"
  - name: "C Tools"
    items:
      - name: "acopost"
        description: "A part-of-speech tagging system in C for efficient text processing."
        repository_url: "https://github.com/tresoldi/acopost"
        language: "C"
