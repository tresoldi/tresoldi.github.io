{% extends "base.html" %}
{% block content %}
<article class="col page">
  <header class="page-head">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="body">
    {{ content | safe }}
    {% if bibliography_html %}
    <section class="bibliography">
      {{ bibliography_html | safe }}
    </section>
    {% endif %}
  </div>
</article>
{% endblock %}
